name: Weekly scrape

on:
  schedule:
    # Dimanche 03:00 UTC = 04h Bruxelles l'hiver, 05h l'été
    - cron: '0 3 * * 0'
  workflow_dispatch: # déclenchement manuel via l'onglet Actions

permissions:
  contents: write

concurrency:
  group: scrape-${{ github.ref }}
  cancel-in-progress: false

env:
  # Node 20 deprecated le 2 juin 2026. Force les JavaScript actions
  # (actions/checkout, actions/setup-node) à utiliser Node 24 en
  # attendant qu'elles publient des versions natives Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run aggregator
        run: node scripts/aggregate.js

      - name: Commit & push (rebase si remote a bougé)
        run: |
          set -e
          if [ -z "$(git status --porcelain data/concerts.json)" ]; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/concerts.json
          git commit -m "Weekly concerts update — $(date -u +%Y-%m-%d)"

          # Push avec retry. Si le remote a bougé entre le checkout et la
          # fin du scrape (~25 min), on rebase sur origin/main et on
          # retente. En cas de conflit sur concerts.json (rare — ce fichier
          # n'est touché que par ce workflow), on cède la priorité au
          # remote : `-X ours` dans le contexte rebase = upstream/humain
          # gagne. Le scrape recommencera de toute façon la semaine
          # suivante.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed — fetching and rebasing on origin/main"
            git fetch origin main
            if ! git rebase -X ours origin/main; then
              echo "Rebase irrecoverable, aborting" >&2
              git rebase --abort || true
              exit 1
            fi
            sleep 5
          done
          echo "Push failed after 3 attempts" >&2
          exit 1
