name: Nightly scrape

on:
  # 04:00 UTC = 05h Bruxelles l'hiver, 06h l'été.
  # Décommenter cette section quand tous les scrapers seront stabilisés.
  # schedule:
  #   - cron: '0 4 * * *'
  workflow_dispatch: # déclenchement manuel via l'onglet Actions

permissions:
  contents: write

concurrency:
  group: scrape-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run aggregator
        run: node scripts/aggregate.js

      - name: Commit if changed
        run: |
          if [ -z "$(git status --porcelain data/concerts.json)" ]; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/concerts.json
          git commit -m "Nightly concerts update — $(date -u +%Y-%m-%d)"
          git push
